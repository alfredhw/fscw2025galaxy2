// Remap college index based on department
function remapBucket(dept, oldCol, title, pub) {
  if (pub === 'Poetry') return 4; // Arts & Humanities
  if (dept && DEPT_TO_BUCKET[dept] !== undefined) return DEPT_TO_BUCKET[dept];
  // Try partial match on first segment
  if (dept) {
    const first = dept.split(';')[0].split('/')[0].trim();
    for (const [key, val] of Object.entries(DEPT_TO_BUCKET)) {
      if (key.startsWith(first) || first.startsWith(key.split(';')[0].split('/')[0].trim())) return val;
    }
  }
  // Fall back to title-based classification
  return classifyByTitle(title, pub);
}

// Animate stat counters
function animateCounter(el, target) {
  let current = 0;
  const step = Math.max(1, Math.floor(target / 60));
  const interval = setInterval(() => {
    current = Math.min(current + step, target);
    el.textContent = current.toLocaleString();
    if (current >= target) clearInterval(interval);
  }, 16);
}

function toggleCollegeFilter(idx) {
  if (activeCollege === idx) {

    legendEl.querySelectorAll('.legend-item').forEach(e => e.classList.remove('active'));
  } else {
    activeCollege = idx;
    legendEl.querySelectorAll('.legend-item').forEach(e =>
      e.classList.toggle('active', parseInt(e.dataset.col) === idx));

  updateVisibility();
  resetIdleTimer();
}

  oaFilter = false;
  activeCollege = -1;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.cat-btn[data-cat="all"]').classList.add('active');
  document.getElementById('oa-toggle').classList.remove('active');
  document.querySelectorAll('.legend-item').forEach(li => li.classList.remove('active'));
  updateVisibility();
  hideCard();
  resetIdleTimer();
});

document.getElementById('oa-toggle').addEventListener('click', () => {
  oaFilter = !oaFilter;
  document.getElementById('oa-toggle').classList.toggle('active', oaFilter);
  updateVisibility();
  resetIdleTimer();
});

function updateVisibility() {
  for (const s of stars) {
    let vis = true;
    if (activeCollege >= 0 && s.col !== activeCollege) vis = false;
    if (activeCategory !== 'all' && s.cat !== parseInt(activeCategory)) vis = false;
    if (oaFilter && !s.oa) vis = false;
    s.targetAlpha = vis ? 1 : 0.04;
  }
}

// ══════════════════════════════════════════════════════
// POSITION LAYOUTS
// ══════════════════════════════════════════════════════
let currentMode = 'galaxy';

function galaxyPosition(i, total) {
  // Spiral galaxy layout
  const arms = 4;
  const arm = i % arms;
  const armAngle = (arm / arms) * Math.PI * 2;
  const t = (i / total);
  const maxR = Math.max(W, H) * 0.40;
  const radius = (0.06 + t * 0.94) * maxR;
  const spiralAngle = armAngle + t * 3.2 * Math.PI;
  // Add scatter — more at edges
  const scatter = radius * 0.25 + 10 * S;
  const sx = (seededRand(i * 3) - 0.5) * scatter;
  const sy = (seededRand(i * 3 + 1) - 0.5) * scatter;
  return {
    x: cx + Math.cos(spiralAngle) * radius + sx,
    y: cy + Math.sin(spiralAngle) * radius * 0.65 + sy  // flatten vertically for ellipse
  };
}

// Seeded random for consistent positions
function seededRand(seed) {
  let x = Math.sin(seed * 127.1 + 311.7) * 43758.5453;
  return x - Math.floor(x);
}

// ── Flame logo positions ──
let flamePoints = null;

function sampleFlamePoints() {
  // Use an offscreen canvas to rasterize the SVG and sample filled pixels
  const svgEl = document.querySelector('#flame-svg-hidden svg');
  if (!svgEl) return [];

  const svgW = 223.2, svgH = 102;
  // Target size on screen
  const scale = Math.min(W * 0.7 / svgW, H * 0.65 / svgH);
  const rW = Math.round(svgW * scale);
  const rH = Math.round(svgH * scale);
  const offX = (W - rW) / 2;
  const offY = (H - rH) / 2;

  // Render SVG to offscreen canvas
  const oc = document.createElement('canvas');
  oc.width = rW; oc.height = rH;
  const octx = oc.getContext('2d');

  // Draw SVG using an image
  const svgData = new XMLSerializer().serializeToString(svgEl);
  const blob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(blob);

  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      octx.drawImage(img, 0, 0, rW, rH);
      URL.revokeObjectURL(url);

      const imageData = octx.getImageData(0, 0, rW, rH);
      const pixels = imageData.data;
      const points = [];

      // Sample filled pixels, tagging flame vs text regions.
      // The SVG flame paths are orange (#FF671F, R=255) and the UND text is green (#009A44, R=0).
      const step = Math.max(2, Math.floor(Math.sqrt(rW * rH / (stars.length * 3))));
      for (let y = 0; y < rH; y += step) {
        for (let x = 0; x < rW; x += step) {
          const idx = (y * rW + x) * 4;
          if (pixels[idx + 3] > 50) {  // alpha > threshold = filled
            const isFlame = pixels[idx] > 128;  // R channel high = orange flame region
            points.push({ x: offX + x, y: offY + y, isFlame });
          }
        }
      }

      // Shuffle and resolve
      for (let i = points.length - 1; i > 0; i--) {
        const j = Math.floor(seededRand(i * 7 + 13) * (i + 1));
        [points[i], points[j]] = [points[j], points[i]];
      }

      resolve(points);
    };
    img.src = url;
  });
}

function flamePosition(i, total) {
  if (!flamePoints || flamePoints.length === 0) return galaxyPosition(i, total);
  const pt = flamePoints[i % flamePoints.length];
  // Add small jitter
  const jit = 3 * S;
  return {
    x: pt.x + (seededRand(i * 5 + 7) - 0.5) * jit,
    y: pt.y + (seededRand(i * 5 + 8) - 0.5) * jit,
    isFlame: pt.isFlame
  };
}

async function assignPositions(mode, instant) {
  if (mode === 'flame' && !flamePoints) {
    flamePoints = await sampleFlamePoints();
  }

  const getPos = mode === 'flame' ? flamePosition : galaxyPosition;

  // Sort stars for consistent spiral assignment
  const sorted = [...stars].sort((a, b) => a.col - b.col || a.cat - b.cat);

  sorted.forEach((s, i) => {
    const pos = getPos(i, sorted.length);
    s.tx = pos.x;
    s.ty = pos.y;
    // Tag stars in the flame region (only meaningful in flame mode)
    s.inFlameRegion = mode === 'flame' ? !!pos.isFlame : false;
    // Scale down halo on large displays — cap S contribution to star size
    const sizeCap = Math.min(S, 0.85 + S * 0.35);
    s.baseSize = (1.5 + seededRand(s.idx * 2) * 2.5) * sizeCap;
    if (instant) {
      s.x = s.tx;
      s.y = s.ty;
      s.size = s.baseSize;
    }
  });
}

// ══════════════════════════════════════════════════════
// MODE SWITCHING
// ══════════════════════════════════════════════════════
const modeButtons = document.querySelectorAll('.mode-btn');
const modeLabel = document.getElementById('mode-label');
const MODES = ['galaxy', 'flame'];
const MODE_LABELS = { galaxy: 'Galaxy of Discovery', flame: 'The UND Flame' };

async function setMode(mode, fromIdle) {
  currentMode = mode;
  modeButtons.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  await assignPositions(mode, false);

  // Show label briefly
  modeLabel.textContent = MODE_LABELS[mode] || mode;
  modeLabel.classList.add('visible');
  setTimeout(() => modeLabel.classList.remove('visible'), 3000);
}

modeButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    setMode(btn.dataset.mode);
    resetIdleTimer();
  });
});

// ══════════════════════════════════════════════════════
// IDLE AUTO-CYCLE (90 seconds)
// ══════════════════════════════════════════════════════
let idleTimer = null;
let idleModeIndex = 0;

function resetIdleTimer() {
  clearTimeout(idleTimer);
  idleTimer = setTimeout(idleCycle, 90000);
}

function idleCycle() {
  idleModeIndex = (idleModeIndex + 1) % MODES.length;
  setMode(MODES[idleModeIndex], true);
  idleTimer = setTimeout(idleCycle, 90000);
}

resetIdleTimer();

// Reset idle on any interaction
['pointerdown','pointermove','keydown'].forEach(evt =>
  window.addEventListener(evt, resetIdleTimer, {passive: true}));

// ══════════════════════════════════════════════════════
// BACKGROUND STARS (ambient)
// ══════════════════════════════════════════════════════
const bgStars = Array.from({length: 400}, () => ({
  x: Math.random(), y: Math.random(),
  s: 0.3 + Math.random() * 1.2,
  a: 0.1 + Math.random() * 0.3,
  tw: Math.random() * Math.PI * 2,
}));

// ══════════════════════════════════════════════════════
// RENDER LOOP
// ══════════════════════════════════════════════════════
let selectedStar = null;
let hoveredStar = null;
let galaxyRotation = 0;

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background gradient
  const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.7);
  bg.addColorStop(0, '#0c0c24');
  bg.addColorStop(0.5, '#080816');
  bg.addColorStop(1, '#040408');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Ambient background stars
  for (const bs of bgStars) {
    const twinkle = 0.5 + 0.5 * Math.sin(bs.tw + performance.now() * 0.001 * 0.5);
    ctx.fillStyle = `rgba(180,190,220,${bs.a * twinkle})`;
    ctx.beginPath();
    ctx.arc(bs.x * W, bs.y * H, bs.s * S, 0, Math.PI * 2);
    ctx.fill();
  }

  // Subtle galaxy rotation for galaxy mode
  if (currentMode === 'galaxy') {
    galaxyRotation += 0.00003;
  }

  // Center glow for galaxy mode
  if (currentMode === 'galaxy') {
    const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.min(W, H) * 0.15);
    glow.addColorStop(0, 'rgba(0,154,68,0.08)');
    glow.addColorStop(0.5, 'rgba(0,154,68,0.02)');
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);
  }

  const now = performance.now();

  // Draw stars
  for (const s of stars) {
    // Lerp position
    s.x += (s.tx - s.x) * 0.03;
    s.y += (s.ty - s.y) * 0.03;

    // Lerp alpha
    s.alpha += (s.targetAlpha - s.alpha) * 0.06;

    if (s.alpha < 0.02) continue;

    // Galaxy rotation (subtle)
    let drawX = s.x, drawY = s.y;
    if (currentMode === 'galaxy' && galaxyRotation) {
      const dx = s.x - cx, dy = s.y - cy;
      const cos = Math.cos(galaxyRotation), sin = Math.sin(galaxyRotation);
      drawX = cx + dx * cos - dy * sin;
      drawY = cy + dx * sin + dy * cos;
    }

    // Twinkle
    // Dual-frequency twinkle: fast brightness + slow size pulse (more pronounced)
    const tw1 = 0.35 + 0.65 * Math.sin(s.twinkle + now * 0.001 * s.twinkleSpeed);
    const tw2 = 0.75 + 0.25 * Math.sin(s.twinkle2 + now * 0.001 * s.twinkleSpeed2);
    const alpha = s.alpha * tw1;

    // In flame mode, stars in the orange flame region get forced to orange
    const FLAME_ORANGE = {r:255, g:140, b:30, hex:'#ff8c1e'};
    const color = (s.inFlameRegion) ? FLAME_ORANGE : COLLEGE_COLORS[s.col];
    const isHovered = s === hoveredStar;
    const isSelected = s === selectedStar;
    const sizeMult = isHovered ? 2.2 : isSelected ? 1.8 : tw2;
    const size = s.baseSize * sizeMult;

    // Halo scale: shrink on large screens to reduce crowding
    const haloScale = S > 1.2 ? 0.65 + 0.55 / S : 1.0;

    // OA glow
    if (s.oa && s.alpha > 0.5) {
      ctx.fillStyle = `rgba(0,212,170,${alpha * 0.10})`;
      ctx.beginPath();
      ctx.arc(drawX, drawY, size * 3.2 * haloScale, 0, Math.PI * 2);
      ctx.fill();
    }

    // Outer glow
    ctx.fillStyle = `rgba(${color.r},${color.g},${color.b},${alpha * 0.18})`;
    ctx.beginPath();
    ctx.arc(drawX, drawY, size * 2.0 * haloScale, 0, Math.PI * 2);
    ctx.fill();

    // Main star body
    ctx.fillStyle = `rgba(${color.r},${color.g},${color.b},${alpha * 0.85})`;
    ctx.beginPath();
    ctx.arc(drawX, drawY, size, 0, Math.PI * 2);
    ctx.fill();

    // Bright center
    ctx.fillStyle = `rgba(255,255,255,${alpha * 0.6})`;
    ctx.beginPath();
    ctx.arc(drawX, drawY, size * 0.4, 0, Math.PI * 2);
    ctx.fill();

    // Store draw position for hit testing
    s.drawX = drawX;
    s.drawY = drawY;
  }

  // Connection lines for selected star (same author)
  if (selectedStar && selectedStar.a) {
    const firstAuthor = selectedStar.a.split(';')[0].trim().split(',')[0].trim();
    if (firstAuthor) {
      for (const s of stars) {
        if (s === selectedStar || s.alpha < 0.1) continue;
        const sFirst = s.a.split(';')[0].trim().split(',')[0].trim();
        if (sFirst === firstAuthor) {
          const color = COLLEGE_COLORS[selectedStar.col];
          ctx.strokeStyle = `rgba(${color.r},${color.g},${color.b},0.15)`;
          ctx.lineWidth = 1.5 * S;
          ctx.beginPath();
          ctx.moveTo(selectedStar.drawX, selectedStar.drawY);
          ctx.lineTo(s.drawX, s.drawY);
          ctx.stroke();
        }
      }
    }
  }

  requestAnimationFrame(draw);
}

// ══════════════════════════════════════════════════════
// HIT TESTING
// ══════════════════════════════════════════════════════
function findStar(mx, my) {
  const dpr = window.devicePixelRatio || 1;
  const px = mx * dpr, py = my * dpr;
  let closest = null, closestDist = 30 * S;
  for (const s of stars) {
    if (s.alpha < 0.1) continue;
    const dx = (s.drawX || s.x) - px;
    const dy = (s.drawY || s.y) - py;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < closestDist) {
      closestDist = dist;
      closest = s;
    }
  }
  return closest;
}

// ══════════════════════════════════════════════════════
// DETAIL CARD
// ══════════════════════════════════════════════════════
const card = document.getElementById('detail-card');

function showCard(s, screenX, screenY) {
  const color = COLLEGE_COLORS[s.col];
  document.getElementById('card-domain').textContent = COLLEGES[s.col] || 'Research';
  document.getElementById('card-domain').style.color = color.hex;
  document.getElementById('card-category').textContent = CATEGORIES[s.cat] || '';

  let title = s.t;
  if (title === title.toUpperCase() && title.length > 5) {
    title = title.replace(/\b\w+/g, w => w.charAt(0) + w.slice(1).toLowerCase());
  }
  const titleEl = document.getElementById('card-title');
  const doiUrl = s.doi.startsWith('http') ? s.doi : 'https://doi.org/' + s.doi;
  if (s.oa && s.doi) {
    titleEl.innerHTML = '<a href="' + doiUrl + '" onclick="var w=900,h=700;window.open(this.href,\'_blank\',\'width=\'+w+\',height=\'+h+\',left=\'+(screen.width/2-w/2)+\',top=\'+(screen.height/2-h/2)+\',scrollbars=yes,resizable=yes\');return false;">' + title + '</a>';
  } else if (s.doi) {
    titleEl.innerHTML = '<a href="' + doiUrl + '" onclick="var w=900,h=700;window.open(this.href,\'_blank\',\'width=\'+w+\',height=\'+h+\',left=\'+(screen.width/2-w/2)+\',top=\'+(screen.height/2-h/2)+\',scrollbars=yes,resizable=yes\');return false;" style="border-bottom-color:rgba(255,255,255,0.2)">' + title + '</a>';
  } else {
    titleEl.textContent = title;
  }

  let meta = '';
  if (s.a) meta += '<strong>' + s.a.replace(/;/g, '; ') + '</strong><br>';
  if (s.pub) meta += s.pub;
  if (s.year) meta += (s.pub ? ' &middot; ' : '') + s.year;
  if (s.dept) meta += '<br><span style="color:rgba(255,255,255,0.35)">' + s.dept + '</span>';
  document.getElementById('card-meta').innerHTML = meta;

  let badges = '';
  if (s.oa) {
    const statusLabel = s.oaStat ? s.oaStat.charAt(0).toUpperCase() + s.oaStat.slice(1) + ' OA' : 'Open Access';
    badges += '<span class="badge" style="color:#00d4aa;border-color:rgba(0,212,170,0.3)">' + statusLabel + '</span>';
  }
  badges += '<span class="badge">' + CATEGORIES[s.cat] + '</span>';
  document.getElementById('card-badges').innerHTML = badges;

  // Position card
  const cw = 420 * S;
  let left = screenX + 20;
  let top = screenY - 50;
  if (left + cw > window.innerWidth - 20) left = screenX - cw - 20;
  if (top < 20) top = 20;
  if (top + 300 > window.innerHeight - 20) top = window.innerHeight - 320;
  card.style.left = left + 'px';
  card.style.top = top + 'px';
  card.classList.add('visible');
  selectedStar = s;
}

function hideCard() {
  card.classList.remove('visible');
  selectedStar = null;
}

// ══════════════════════════════════════════════════════
// INPUT HANDLERS
// ══════════════════════════════════════════════════════
canvas.addEventListener('pointermove', e => {
  const s = findStar(e.clientX, e.clientY);
  hoveredStar = s;
  canvas.style.cursor = s ? 'pointer' : 'default';
});

canvas.addEventListener('pointerdown', e => {
  const s = findStar(e.clientX, e.clientY);
  if (s) {
    showCard(s, e.clientX, e.clientY);
  } else {
    hideCard();
  }
  resetIdleTimer();
});

// Close card on Escape, toggle search on S
const searchArea = document.getElementById('search-area');
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    hideCard();
    searchArea.classList.remove('visible');
    searchInput.blur();
  }
  if ((e.key === 's' || e.key === 'S') && document.activeElement !== searchInput) {
    e.preventDefault();
    searchArea.classList.toggle('visible');
    if (searchArea.classList.contains('visible')) {
      searchInput.focus();
    } else {
      searchInput.blur();
      searchResults.classList.remove('visible');
    }
  }
});

// ══════════════════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════════════════
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (q.length < 2) {
    searchResults.classList.remove('visible');
    return;
  }

  const matches = stars.filter(s =>
    s.t.toLowerCase().includes(q) ||
    s.a.toLowerCase().includes(q) ||
    s.dept.toLowerCase().includes(q) ||
    s.pub.toLowerCase().includes(q)
  ).slice(0, 12);

  if (matches.length === 0) {
    searchResults.classList.remove('visible');
    return;
  }

  searchResults.innerHTML = matches.map((s, i) =>
    '<div class="search-result" data-idx="' + s.idx + '">' +
    '<div class="sr-title">' + s.t + '</div>' +
    '<div class="sr-author">' + (s.a || CATEGORIES[s.cat]) + '</div></div>'
  ).join('');
  searchResults.classList.add('visible');

  searchResults.querySelectorAll('.search-result').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx);
      const s = stars[idx];
      // Highlight this star
      selectedStar = s;
      const dpr = window.devicePixelRatio || 1;
      showCard(s, (s.drawX || s.x) / dpr, (s.drawY || s.y) / dpr);
      searchResults.classList.remove('visible');
      searchInput.value = '';
      resetIdleTimer();
    });
  });
});

searchInput.addEventListener('blur', () => {
  setTimeout(() => searchResults.classList.remove('visible'), 200);
});
searchInput.addEventListener('focus', () => {
  if (searchInput.value.trim().length >= 2) {
    searchInput.dispatchEvent(new Event('input'));
  }
  resetIdleTimer();
});

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
resize();
draw();

// Pre-sample flame points after a short delay
setTimeout(async () => {
  flamePoints = await sampleFlamePoints();
}, 1000);
</script>
</body>
</html>
