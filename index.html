<style>
:root { --s: 1; --pad: calc(24px * var(--s)); --pad-lg: calc(40px * var(--s)); }
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%; overflow:hidden;
  background:#060612;
  font-family:'DM Sans',sans-serif;
  color:#fff; cursor:default;
  user-select:none; -webkit-user-select:none;
  touch-action:none;
}
canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; }

/* Header */
#header {
  position:fixed; top:0; left:0; right:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding:var(--pad) var(--pad-lg);
  background:linear-gradient(180deg,rgba(6,6,18,0.95) 0%,rgba(6,6,18,0.6) 70%,transparent 100%);
  pointer-events:none;
}
#header > * { pointer-events:auto; }
.logo-area { display:flex; align-items:center; gap:calc(16px * var(--s)); }
.logo-area h1 {
  font-family:'Oswald',sans-serif; font-weight:600;
  font-size:calc(32px * var(--s)); letter-spacing:calc(2px * var(--s));
  text-transform:uppercase; color:#fff;
}
.logo-area h1 span { color:#009a44; }
.logo-area .subtitle {
  font-family:'DM Sans',sans-serif; font-weight:300;
  font-size:calc(14px * var(--s)); color:rgba(255,255,255,0.5);
  letter-spacing:calc(1px * var(--s)); text-transform:uppercase;
  margin-top:calc(2px * var(--s));
}

/* Stats bar */
#stats-bar {
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  display:flex; align-items:center; justify-content:center;
  gap:calc(48px * var(--s));
  padding:calc(24px * var(--s)) var(--pad-lg);
  background:linear-gradient(0deg,rgba(6,6,18,0.95) 0%,rgba(6,6,18,0.6) 70%,transparent 100%);
}
.stat { text-align:center; }
.stat .value {

  font-size:calc(38px * var(--s)); color:#009a44;
  line-height:1; letter-spacing:calc(1px * var(--s));
}
.stat .label {
  font-size:calc(11px * var(--s)); font-weight:500;
  color:rgba(255,255,255,0.45); text-transform:uppercase;
  letter-spacing:calc(2px * var(--s)); margin-top:calc(6px * var(--s));
}

/* Mode switcher */
#mode-switcher {
  position:fixed; top:calc(100px * var(--s)); left:50%; transform:translateX(-50%);
  z-index:100; display:flex; gap:calc(4px * var(--s));
  padding:calc(4px * var(--s));
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(12px);
  border-radius:calc(28px * var(--s));
  border:1px solid rgba(255,255,255,0.08);
}
.mode-btn {
  padding:calc(10px * var(--s)) calc(22px * var(--s));
  border:none; border-radius:calc(24px * var(--s));
  background:transparent; color:rgba(255,255,255,0.5);
  font-family:'DM Sans',sans-serif; font-size:calc(13px * var(--s));
  font-weight:500; cursor:pointer; transition:all 0.3s ease;
  letter-spacing:calc(0.5px * var(--s));
}
.mode-btn:hover { color:rgba(255,255,255,0.8); }
.mode-btn.active {
  background:rgba(0,154,68,0.25); color:#fff;
  box-shadow:0 2px 12px rgba(0,154,68,0.2);
}

/* Legend */
#legend {
  position:fixed; top:50%; right:calc(32px * var(--s)); z-index:100;
  transform:translateY(-50%);
  display:flex; flex-direction:column;
  gap:calc(10px * var(--s));
}
.legend-item {
  display:flex; align-items:center;
  gap:calc(12px * var(--s));
  padding:calc(10px * var(--s)) calc(18px * var(--s));
  border-radius:calc(28px * var(--s));
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(8px);
  cursor:pointer; transition:all 0.3s ease;
  border:1px solid rgba(255,255,255,0.05);
}
.legend-item:hover, .legend-item.active {
  background:rgba(255,255,255,0.1);
  border-color:rgba(255,255,255,0.12);
}
.legend-dot {
  width:calc(12px * var(--s)); height:calc(12px * var(--s));
  border-radius:50%; flex-shrink:0;
}
.legend-label {
  font-size:calc(13px * var(--s)); font-weight:400;
  color:rgba(255,255,255,0.65); white-space:nowrap;
}
.legend-count {
  font-size:calc(11px * var(--s)); font-weight:600;
  color:rgba(255,255,255,0.35); margin-left:auto;
  font-family:'Space Mono',monospace;
}

/* Category filter */
#cat-filter {
  position:fixed; bottom:calc(100px * var(--s)); left:50%; transform:translateX(-50%);
  z-index:100; display:flex; gap:calc(4px * var(--s));
  padding:calc(4px * var(--s));
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border-radius:calc(24px * var(--s));
  border:1px solid rgba(255,255,255,0.06);
}
.cat-btn {
  padding:calc(8px * var(--s)) calc(16px * var(--s));
  border:none; border-radius:calc(20px * var(--s));
  background:transparent; color:rgba(255,255,255,0.45);
  font-family:'DM Sans',sans-serif; font-size:calc(12px * var(--s));
  font-weight:500; cursor:pointer; transition:all 0.3s ease;
}
.cat-btn:hover { color:rgba(255,255,255,0.7); }
.cat-btn.active {
  background:rgba(255,255,255,0.1); color:#fff;
}

/* OA toggle */
#oa-toggle {
  position:fixed; bottom:calc(150px * var(--s)); left:50%; transform:translateX(-50%);
  z-index:100;
  padding:calc(10px * var(--s)) calc(22px * var(--s));
  border:1px solid rgba(0,212,170,0.2);
  border-radius:calc(24px * var(--s));
  background:rgba(0,212,170,0.05);
  backdrop-filter:blur(12px);
  color:rgba(0,212,170,0.7);
  font-family:'DM Sans',sans-serif; font-size:calc(13px * var(--s));
  font-weight:500; cursor:pointer; transition:all 0.3s ease;
}
#oa-toggle:hover { background:rgba(0,212,170,0.1); border-color:rgba(0,212,170,0.4); }
#oa-toggle.active {
  background:rgba(0,212,170,0.15); border-color:rgba(0,212,170,0.5);
  color:#00d4aa; box-shadow:0 0 20px rgba(0,212,170,0.15);
}

/* Detail card */
#detail-card {
  position:fixed; z-index:200;
  width:calc(420px * var(--s));
  padding:calc(28px * var(--s)) calc(32px * var(--s));

  border:1px solid rgba(255,255,255,0.1);
  border-radius:calc(16px * var(--s));

  opacity:0; transform:scale(0.95) translateY(8px);
  transition:opacity 0.3s ease,transform 0.3s ease;
  pointer-events:none;
  max-height:70vh; overflow-y:auto;
}
#detail-card.visible { opacity:1; transform:scale(1) translateY(0); pointer-events:auto; }
.card-domain {
  font-family:'Space Mono',monospace; font-size:calc(10px * var(--s));
  text-transform:uppercase; letter-spacing:calc(2px * var(--s));
  margin-bottom:calc(4px * var(--s));
}
.card-category {
  font-size:calc(10px * var(--s)); color:rgba(255,255,255,0.35);
  text-transform:uppercase; letter-spacing:calc(1.5px * var(--s));
  margin-bottom:calc(10px * var(--s));
}
.card-title {
  font-family:'Oswald',sans-serif; font-weight:500;
  font-size:calc(20px * var(--s)); line-height:1.3;
  margin-bottom:calc(14px * var(--s)); color:#fff;
}
.card-title a {
  color:#fff; text-decoration:none;
  border-bottom:1px solid rgba(0,154,68,0.4);
  transition:border-color 0.2s,color 0.2s; cursor:pointer;
}
.card-title a:hover { color:#00d4aa; border-bottom-color:#00d4aa; }
.card-meta {
  font-size:calc(13px * var(--s)); color:rgba(255,255,255,0.55);
  line-height:1.6; margin-bottom:calc(10px * var(--s));
}
.card-meta strong { color:rgba(255,255,255,0.85); font-weight:500; }
.card-badges {
  display:flex; gap:calc(8px * var(--s));
  flex-wrap:wrap; margin-top:calc(14px * var(--s));
}
.badge {
  font-size:calc(10px * var(--s));
  padding:calc(4px * var(--s)) calc(10px * var(--s));
  border-radius:calc(12px * var(--s));
  background:rgba(255,255,255,0.06);
  color:rgba(255,255,255,0.5);
  border:1px solid rgba(255,255,255,0.08);
}
.card-close {
  position:absolute; top:calc(12px * var(--s)); right:calc(16px * var(--s));
  width:calc(28px * var(--s)); height:calc(28px * var(--s));
  border:none; background:rgba(255,255,255,0.08);
  border-radius:50%; color:rgba(255,255,255,0.5);
  font-size:calc(16px * var(--s)); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:background 0.2s;
}
.card-close:hover { background:rgba(255,255,255,0.15); }

/* Search */
#search-area { position:relative; opacity:0; pointer-events:none; transition:opacity 0.3s ease; }
#search-area.visible { opacity:1; pointer-events:auto; }
#search-input {
  width:calc(280px * var(--s));
  padding:calc(10px * var(--s)) calc(16px * var(--s)) calc(10px * var(--s)) calc(40px * var(--s));
  border:1px solid rgba(255,255,255,0.12);
  border-radius:calc(24px * var(--s));
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(12px);
  color:#fff; font-family:'DM Sans',sans-serif;
  font-size:calc(14px * var(--s)); outline:none;
  transition:all 0.3s ease;
}
#search-input::placeholder { color:rgba(255,255,255,0.3); }
#search-input:focus {
  border-color:rgba(0,154,68,0.5);
  background:rgba(255,255,255,0.1);
  width:calc(360px * var(--s));
}
#search-icon {
  position:absolute; left:calc(14px * var(--s)); top:50%; transform:translateY(-50%);
  color:rgba(255,255,255,0.3); pointer-events:none;
}
#search-results {
  position:absolute; top:100%; left:0; right:0;
  margin-top:calc(8px * var(--s));
  background:rgba(12,12,30,0.95);
  backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:calc(12px * var(--s));
  max-height:calc(300px * var(--s));
  overflow-y:auto; display:none;
}
#search-results.visible { display:block; }
.search-result {
  padding:calc(12px * var(--s)) calc(16px * var(--s));
  cursor:pointer; transition:background 0.2s;
  border-bottom:1px solid rgba(255,255,255,0.04);
}
.search-result:hover { background:rgba(255,255,255,0.08); }
.sr-title {
  font-size:calc(13px * var(--s)); font-weight:500;
  color:rgba(255,255,255,0.85);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  margin-bottom:calc(3px * var(--s));
}
.sr-author {
  font-size:calc(11px * var(--s)); color:rgba(255,255,255,0.4);
}

/* Idle overlay label */
#mode-label {
  position:fixed; bottom:calc(200px * var(--s)); left:50%; transform:translateX(-50%);
  z-index:90; font-family:'Oswald',sans-serif;
  font-size:calc(18px * var(--s)); font-weight:300;
  color:rgba(255,255,255,0.3); letter-spacing:calc(3px * var(--s));
  text-transform:uppercase;
  opacity:0; transition:opacity 1s ease;
  pointer-events:none;
}
#mode-label.visible { opacity:1; }

/* Hidden SVG for flame sampling */
#flame-svg-hidden { position:absolute; top:-9999px; left:-9999px; }

    const first = s.a.split(';')[0].trim().split(',')[0].trim();
    if (first) facSet.add(first);
  }
  if (s.dept) deptSet.add(s.dept);
  if (s.oa) oaCount++;
}

// Animate stat counters
function animateCounter(el, target) {
  let current = 0;
  const step = Math.max(1, Math.floor(target / 60));
  const interval = setInterval(() => {
    current = Math.min(current + step, target);
    el.textContent = current.toLocaleString();
    if (current >= target) clearInterval(interval);
  }, 16);
}
animateCounter(document.getElementById('stat-works'), stars.length);
animateCounter(document.getElementById('stat-faculty'), facSet.size);
animateCounter(document.getElementById('stat-oa'), oaCount);
animateCounter(document.getElementById('stat-depts'), deptSet.size);

// ══════════════════════════════════════════════════════
// CANVAS SETUP
// ══════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, S, cx, cy;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = canvas.width = window.innerWidth * dpr;
  H = canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  cx = W / 2; cy = H / 2;
  const diag = Math.sqrt(W * W + H * H);
  S = diag / (1920 * (window.devicePixelRatio || 1));
  document.documentElement.style.setProperty('--s', S);
  assignPositions(currentMode, true);
}
window.addEventListener('resize', resize);

// ══════════════════════════════════════════════════════
// LEGEND
// ══════════════════════════════════════════════════════
const legendEl = document.getElementById('legend');
const collegeCounts = new Array(COLLEGES.length).fill(0);
for (const s of stars) collegeCounts[s.col]++;

COLLEGES.forEach((name, i) => {
  if (collegeCounts[i] === 0) return;
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.dataset.col = i;
  item.innerHTML = `<div class="legend-dot" style="background:${COLLEGE_COLORS[i].hex}"></div>` +
    `<span class="legend-label">${name}</span>` +
    ``;
  item.addEventListener('click', () => toggleCollegeFilter(i));
  legendEl.appendChild(item);
});

let activeCollege = -1;
function toggleCollegeFilter(idx) {
  if (activeCollege === idx) {
    activeCollege = -1;
    legendEl.querySelectorAll('.legend-item').forEach(e => e.classList.remove('active'));
  } else {
    activeCollege = idx;
    legendEl.querySelectorAll('.legend-item').forEach(e =>
      e.classList.toggle('active', parseInt(e.dataset.col) === idx));
  }
  updateVisibility();
  resetIdleTimer();
}

// ══════════════════════════════════════════════════════
// FILTERS
// ══════════════════════════════════════════════════════
let activeCategory = 'all';
let oaFilter = false;

document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCategory = btn.dataset.cat;
    updateVisibility();
    resetIdleTimer();
  });
});

document.getElementById('oa-toggle').addEventListener('click', () => {
  oaFilter = !oaFilter;
  document.getElementById('oa-toggle').classList.toggle('active', oaFilter);
  updateVisibility();
  resetIdleTimer();
});

function updateVisibility() {
  for (const s of stars) {
    let vis = true;
    if (activeCollege >= 0 && s.col !== activeCollege) vis = false;
    if (activeCategory !== 'all' && s.cat !== parseInt(activeCategory)) vis = false;
    if (oaFilter && !s.oa) vis = false;
    s.targetAlpha = vis ? 1 : 0.04;
  }
}

// ══════════════════════════════════════════════════════
// POSITION LAYOUTS
// ══════════════════════════════════════════════════════
let currentMode = 'galaxy';

function galaxyPosition(i, total) {
  // Spiral galaxy layout
  const arms = 4;
  const arm = i % arms;
  const armAngle = (arm / arms) * Math.PI * 2;
  const t = (i / total);
  const maxR = Math.max(W, H) * 0.44;
  const radius = (0.06 + t * 0.94) * maxR;
  const spiralAngle = armAngle + t * 3.2 * Math.PI;
  // Add scatter — more at edges
  const scatter = radius * 0.25 + 10 * S;
  const sx = (seededRand(i * 3) - 0.5) * scatter;
  const sy = (seededRand(i * 3 + 1) - 0.5) * scatter;
  return {
    x: cx + Math.cos(spiralAngle) * radius + sx,
    y: cy + Math.sin(spiralAngle) * radius * 0.65 + sy  // flatten vertically for ellipse
  };
}

// Seeded random for consistent positions
function seededRand(seed) {
  let x = Math.sin(seed * 127.1 + 311.7) * 43758.5453;
  return x - Math.floor(x);
}

// ── Flame logo positions ──
let flamePoints = null;

function sampleFlamePoints() {
  // Use an offscreen canvas to rasterize the SVG and sample filled pixels
  const svgEl = document.querySelector('#flame-svg-hidden svg');
  if (!svgEl) return [];

  const svgW = 223.2, svgH = 102;
  // Target size on screen
  const scale = Math.min(W * 0.7 / svgW, H * 0.65 / svgH);
  const rW = Math.round(svgW * scale);
  const rH = Math.round(svgH * scale);
  const offX = (W - rW) / 2;
  const offY = (H - rH) / 2;

  // Render SVG to offscreen canvas
  const oc = document.createElement('canvas');
  oc.width = rW; oc.height = rH;
  const octx = oc.getContext('2d');

  // Draw SVG using an image
  const svgData = new XMLSerializer().serializeToString(svgEl);
  const blob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(blob);

  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      octx.drawImage(img, 0, 0, rW, rH);
      URL.revokeObjectURL(url);

      const imageData = octx.getImageData(0, 0, rW, rH);
      const pixels = imageData.data;
      const points = [];

      // Sample filled pixels
      const step = Math.max(2, Math.floor(Math.sqrt(rW * rH / (stars.length * 3))));
      for (let y = 0; y < rH; y += step) {
        for (let x = 0; x < rW; x += step) {
          const idx = (y * rW + x) * 4;
          if (pixels[idx + 3] > 50) {  // alpha > threshold = filled
            points.push({ x: offX + x, y: offY + y });
          }
        }
      }

      // Shuffle and resolve
      for (let i = points.length - 1; i > 0; i--) {
        const j = Math.floor(seededRand(i * 7 + 13) * (i + 1));
        [points[i], points[j]] = [points[j], points[i]];
      }

      resolve(points);
    };
    img.src = url;
  });
}

function flamePosition(i, total) {
  if (!flamePoints || flamePoints.length === 0) return galaxyPosition(i, total);
  const pt = flamePoints[i % flamePoints.length];
  // Add small jitter
  const jit = 3 * S;
  return {
    x: pt.x + (seededRand(i * 5 + 7) - 0.5) * jit,
    y: pt.y + (seededRand(i * 5 + 8) - 0.5) * jit
  };
}

async function assignPositions(mode, instant) {
  if (mode === 'flame' && !flamePoints) {
    flamePoints = await sampleFlamePoints();
  }

  const getPos = mode === 'flame' ? flamePosition : galaxyPosition;

  // Sort stars for consistent spiral assignment
  const sorted = [...stars].sort((a, b) => a.col - b.col || a.cat - b.cat);

  sorted.forEach((s, i) => {
    const pos = getPos(i, sorted.length);
    s.tx = pos.x;
    s.ty = pos.y;
    // Scale down halo on large displays — cap S contribution to star size
    const sizeCap = Math.min(S, 0.85 + S * 0.35);
    s.baseSize = (1.5 + seededRand(s.idx * 2) * 2.5) * sizeCap;
    if (instant) {
      s.x = s.tx;
      s.y = s.ty;
      s.size = s.baseSize;
    }
  });
}

// ══════════════════════════════════════════════════════
// MODE SWITCHING
// ══════════════════════════════════════════════════════
const modeButtons = document.querySelectorAll('.mode-btn');
const modeLabel = document.getElementById('mode-label');
const MODES = ['galaxy', 'flame'];
const MODE_LABELS = { galaxy: 'Galaxy of Discovery', flame: 'The UND Flame' };

async function setMode(mode, fromIdle) {
  currentMode = mode;
  modeButtons.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  await assignPositions(mode, false);

  // Show label briefly
  modeLabel.textContent = MODE_LABELS[mode] || mode;
  modeLabel.classList.add('visible');
  setTimeout(() => modeLabel.classList.remove('visible'), 3000);
}

modeButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    setMode(btn.dataset.mode);
    resetIdleTimer();
  });
});

// ══════════════════════════════════════════════════════
// IDLE AUTO-CYCLE (90 seconds)
// ══════════════════════════════════════════════════════
let idleTimer = null;
let idleModeIndex = 0;

function resetIdleTimer() {
  clearTimeout(idleTimer);
  idleTimer = setTimeout(idleCycle, 90000);
}

function idleCycle() {
  idleModeIndex = (idleModeIndex + 1) % MODES.length;
  setMode(MODES[idleModeIndex], true);
  idleTimer = setTimeout(idleCycle, 90000);
}

resetIdleTimer();

// Reset idle on any interaction
['pointerdown','pointermove','keydown'].forEach(evt =>
  window.addEventListener(evt, resetIdleTimer, {passive: true}));

// ══════════════════════════════════════════════════════
// BACKGROUND STARS (ambient)
// ══════════════════════════════════════════════════════
const bgStars = Array.from({length: 400}, () => ({
  x: Math.random(), y: Math.random(),
  s: 0.3 + Math.random() * 1.2,
  a: 0.1 + Math.random() * 0.3,
  tw: Math.random() * Math.PI * 2,
}));

// ══════════════════════════════════════════════════════
// RENDER LOOP
// ══════════════════════════════════════════════════════
let selectedStar = null;
let hoveredStar = null;
let galaxyRotation = 0;

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background gradient
  const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.7);
  bg.addColorStop(0, '#0c0c24');
  bg.addColorStop(0.5, '#080816');
  bg.addColorStop(1, '#040408');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Ambient background stars
  for (const bs of bgStars) {
    const twinkle = 0.5 + 0.5 * Math.sin(bs.tw + performance.now() * 0.001 * 0.5);
    ctx.fillStyle = `rgba(180,190,220,${bs.a * twinkle})`;
    ctx.beginPath();
    ctx.arc(bs.x * W, bs.y * H, bs.s * S, 0, Math.PI * 2);
    ctx.fill();
  }

  // Subtle galaxy rotation for galaxy mode
  if (currentMode === 'galaxy') {
    galaxyRotation += 0.00003;
  }

  // Center glow for galaxy mode
  if (currentMode === 'galaxy') {
    const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.min(W, H) * 0.15);
    glow.addColorStop(0, 'rgba(0,154,68,0.08)');
    glow.addColorStop(0.5, 'rgba(0,154,68,0.02)');
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);
  }

  const now = performance.now();

  // Draw stars
  for (const s of stars) {
    // Lerp position
    s.x += (s.tx - s.x) * 0.03;
    s.y += (s.ty - s.y) * 0.03;

    // Lerp alpha
    s.alpha += (s.targetAlpha - s.alpha) * 0.06;

    if (s.alpha < 0.02) continue;

    // Galaxy rotation (subtle)
    let drawX = s.x, drawY = s.y;
    if (currentMode === 'galaxy' && galaxyRotation) {
      const dx = s.x - cx, dy = s.y - cy;
      const cos = Math.cos(galaxyRotation), sin = Math.sin(galaxyRotation);
      drawX = cx + dx * cos - dy * sin;
      drawY = cy + dx * sin + dy * cos;
    }

    // Twinkle
    // Dual-frequency twinkle: fast brightness + slow size pulse (more pronounced)
    const tw1 = 0.35 + 0.65 * Math.sin(s.twinkle + now * 0.001 * s.twinkleSpeed);
    const tw2 = 0.75 + 0.25 * Math.sin(s.twinkle2 + now * 0.001 * s.twinkleSpeed2);
    const alpha = s.alpha * tw1;

    const color = COLLEGE_COLORS[s.col];
    const isHovered = s === hoveredStar;
    const isSelected = s === selectedStar;
    const sizeMult = isHovered ? 2.2 : isSelected ? 1.8 : tw2;
    const size = s.baseSize * sizeMult;

    // Halo scale: shrink on large screens to reduce crowding
    const haloScale = S > 1.2 ? 0.65 + 0.55 / S : 1.0;

    // OA glow
    if (s.oa && s.alpha > 0.5) {
      ctx.fillStyle = `rgba(0,212,170,${alpha * 0.10})`;
      ctx.beginPath();
      ctx.arc(drawX, drawY, size * 3.2 * haloScale, 0, Math.PI * 2);
      ctx.fill();
    }

    // Outer glow
    ctx.fillStyle = `rgba(${color.r},${color.g},${color.b},${alpha * 0.18})`;
    ctx.beginPath();
    ctx.arc(drawX, drawY, size * 2.0 * haloScale, 0, Math.PI * 2);
    ctx.fill();

    // Main star body
    ctx.fillStyle = `rgba(${color.r},${color.g},${color.b},${alpha * 0.85})`;
    ctx.beginPath();
    ctx.arc(drawX, drawY, size, 0, Math.PI * 2);
    ctx.fill();

    // Bright center
    ctx.fillStyle = `rgba(255,255,255,${alpha * 0.6})`;
    ctx.beginPath();
    ctx.arc(drawX, drawY, size * 0.4, 0, Math.PI * 2);
    ctx.fill();

    // Store draw position for hit testing
    s.drawX = drawX;
    s.drawY = drawY;
  }

  // Connection lines for selected star (same author)
  if (selectedStar && selectedStar.a) {
    const firstAuthor = selectedStar.a.split(';')[0].trim().split(',')[0].trim();
    if (firstAuthor) {
      for (const s of stars) {
        if (s === selectedStar || s.alpha < 0.1) continue;
        const sFirst = s.a.split(';')[0].trim().split(',')[0].trim();
        if (sFirst === firstAuthor) {
          const color = COLLEGE_COLORS[selectedStar.col];
          ctx.strokeStyle = `rgba(${color.r},${color.g},${color.b},0.15)`;
          ctx.lineWidth = 1.5 * S;
          ctx.beginPath();
          ctx.moveTo(selectedStar.drawX, selectedStar.drawY);
          ctx.lineTo(s.drawX, s.drawY);
          ctx.stroke();
        }
      }
    }
  }

  requestAnimationFrame(draw);
}

// ══════════════════════════════════════════════════════
// HIT TESTING
// ══════════════════════════════════════════════════════
function findStar(mx, my) {
  const dpr = window.devicePixelRatio || 1;
  const px = mx * dpr, py = my * dpr;
  let closest = null, closestDist = 30 * S;
  for (const s of stars) {
    if (s.alpha < 0.1) continue;
    const dx = (s.drawX || s.x) - px;
    const dy = (s.drawY || s.y) - py;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < closestDist) {
      closestDist = dist;
      closest = s;
    }
  }
  return closest;
}

// ══════════════════════════════════════════════════════
// DETAIL CARD
// ══════════════════════════════════════════════════════
const card = document.getElementById('detail-card');

function showCard(s, screenX, screenY) {
  const color = COLLEGE_COLORS[s.col];
  document.getElementById('card-domain').textContent = COLLEGES[s.col] || 'Research';
  document.getElementById('card-domain').style.color = color.hex;
  document.getElementById('card-category').textContent = CATEGORIES[s.cat] || '';

  let title = s.t;
  if (title === title.toUpperCase() && title.length > 5) {
    title = title.replace(/\b\w+/g, w => w.charAt(0) + w.slice(1).toLowerCase());
  }
  const titleEl = document.getElementById('card-title');
  if (s.oa && s.doi) {
    titleEl.innerHTML = '<a href="https://doi.org/' + s.doi + '" target="_blank">' + title + '</a>';
  } else if (s.doi) {
    titleEl.innerHTML = '<a href="https://doi.org/' + s.doi + '" target="_blank" style="border-bottom-color:rgba(255,255,255,0.2)">' + title + '</a>';
  } else {
    titleEl.textContent = title;
  }

  let meta = '';
  if (s.a) meta += '<strong>' + s.a.replace(/;/g, '; ') + '</strong><br>';
  if (s.pub) meta += s.pub;
  if (s.y) meta += (s.pub ? ' &middot; ' : '') + s.y;
  if (s.dept) meta += '<br><span style="color:rgba(255,255,255,0.35)">' + s.dept + '</span>';
  document.getElementById('card-meta').innerHTML = meta;

  let badges = '';
  if (s.oa) {
    const statusLabel = s.oaStat ? s.oaStat.charAt(0).toUpperCase() + s.oaStat.slice(1) + ' OA' : 'Open Access';
    badges += '<span class="badge" style="color:#00d4aa;border-color:rgba(0,212,170,0.3)">' + statusLabel + '</span>';
  }
  badges += '<span class="badge">' + CATEGORIES[s.cat] + '</span>';
  document.getElementById('card-badges').innerHTML = badges;

  // Position card
  const cw = 420 * S;
  let left = screenX + 20;
  let top = screenY - 50;
  if (left + cw > window.innerWidth - 20) left = screenX - cw - 20;
  if (top < 20) top = 20;
  if (top + 300 > window.innerHeight - 20) top = window.innerHeight - 320;
  card.style.left = left + 'px';
  card.style.top = top + 'px';
  card.classList.add('visible');
  selectedStar = s;
}

function hideCard() {
  card.classList.remove('visible');
  selectedStar = null;
}

// ══════════════════════════════════════════════════════
// INPUT HANDLERS
// ══════════════════════════════════════════════════════
canvas.addEventListener('pointermove', e => {
  const s = findStar(e.clientX, e.clientY);
  hoveredStar = s;
  canvas.style.cursor = s ? 'pointer' : 'default';
});

canvas.addEventListener('pointerdown', e => {
  const s = findStar(e.clientX, e.clientY);
  if (s) {
    showCard(s, e.clientX, e.clientY);
  } else {
    hideCard();
  }
  resetIdleTimer();
});

// Close card on Escape, toggle search on S
const searchArea = document.getElementById('search-area');
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    hideCard();
    searchArea.classList.remove('visible');
    searchInput.blur();
  }
  if ((e.key === 's' || e.key === 'S') && document.activeElement !== searchInput) {
    e.preventDefault();
    searchArea.classList.toggle('visible');
    if (searchArea.classList.contains('visible')) {
      searchInput.focus();
    } else {
      searchInput.blur();
      searchResults.classList.remove('visible');
    }
  }
});

// ══════════════════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════════════════
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (q.length < 2) {
    searchResults.classList.remove('visible');
    return;
  }

  const matches = stars.filter(s =>
    s.t.toLowerCase().includes(q) ||
    s.a.toLowerCase().includes(q) ||
    s.dept.toLowerCase().includes(q) ||
    s.pub.toLowerCase().includes(q)
  ).slice(0, 12);

  if (matches.length === 0) {
    searchResults.classList.remove('visible');
    return;
  }

  searchResults.innerHTML = matches.map((s, i) =>
    '<div class="search-result" data-idx="' + s.idx + '">' +
    '<div class="sr-title">' + s.t + '</div>' +
    '<div class="sr-author">' + (s.a || CATEGORIES[s.cat]) + '</div></div>'
  ).join('');
  searchResults.classList.add('visible');

  searchResults.querySelectorAll('.search-result').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx);
      const s = stars[idx];
      // Highlight this star
      selectedStar = s;
      const dpr = window.devicePixelRatio || 1;
      showCard(s, (s.drawX || s.x) / dpr, (s.drawY || s.y) / dpr);
      searchResults.classList.remove('visible');
      searchInput.value = '';
      resetIdleTimer();
    });
  });
});

searchInput.addEventListener('blur', () => {
  setTimeout(() => searchResults.classList.remove('visible'), 200);
});
searchInput.addEventListener('focus', () => {
  if (searchInput.value.trim().length >= 2) {
    searchInput.dispatchEvent(new Event('input'));
  }
  resetIdleTimer();
});

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
resize();
draw();

// Pre-sample flame points after a short delay
setTimeout(async () => {
  flamePoints = await sampleFlamePoints();
}, 1000);
</script>
